<!DOCTYPE html>
<html>

<head>
    <title>Smart Expense Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>💰 Smart Expense Analyzer</h1>

    <div class="dashboard">

        <div class="card">
            <h2>Total Expense</h2>
            <p id="totalExpense">Loading...</p>
        </div>

        <div class="card">
            <h2>Monthly Expense</h2>
            <p id="monthlyExpense">Loading...</p>
        </div>

        <div class="card">
            <h2>Total Bills</h2>
            <p id="totalBills">Loading...</p>
        </div>

        <div class="card">
            <h2>Latest Expense</h2>
            <p id="latestExpense">Loading...</p>
        </div>

    </div>

    <h2>📅 Daily Expense Summary</h2>

    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Total Expense</th>
            </tr>
        </thead>

        <tbody id="dateSummaryTable">

        </tbody>
    </table>

    <h2>🧾 Bill History</h2>

    <table>
        <thead>
            <tr>
                <th>Bill ID</th>
                <th>Amount</th>
                <th>Date</th>
            </tr>
        </thead>

        <tbody id="expenseTable">

        </tbody>
    </table>

    <script src="script-v2.js"></script>

</body>

</html>
